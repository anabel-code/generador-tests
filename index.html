<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Tests</title>
<style>
body {
font-family: sans-serif;
text-align: center;
padding: 50px;

}
.contenedor {
background: white;
padding: 30px;
border-radius: 10px;

}
button {
padding: 10px 20px;

}
</style>
</head>
<body>
<div class="contenedor">
<h1>Mi Generador de Tests</h1>
<p>¡La base de la web ya está lista!</p>
<button onclick="alert('¡El JavaScript también funciona!')">Probar botón</button>
</div>
</body>
</html>
